events {}

http {
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/s;
    limit_req_status 429;

    upstream load_balancer_service {
        server load-balancer:7000;
    }

    upstream dashboard_service {
        server dashboard:3000;
    }

    server {
        listen 8080;

        include /etc/nginx/waf-rules.conf;

        location / {
            proxy_pass http://dashboard_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/ {
            limit_req zone=api_limit burst=10 nodelay;

            proxy_pass http://load_balancer_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /lb/ {
            proxy_pass http://load_balancer_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /cluster/ {
            proxy_pass http://load_balancer_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /gateway/health {
            return 200 "Nginx Gateway is running\n";
        }

        location /gateway/waf/status {
            default_type application/json;
            return 200 '{"waf":"enabled","rules":["SQL Injection","XSS","Path Traversal","Suspicious User-Agent"]}';
        }

        location /gateway/rate-limit/status {
            default_type application/json;
            return 200 '{"rateLimit":"enabled","limit":"5 requests per second","burst":10,"scope":"/api/"}';
        }
    }
}