# Block SQL Injection patterns in query string - plain text
if ($query_string ~* "(union.*select|select.*from|insert.*into|drop.*table|or.*1=1|'.*or.*')") {
    return 403 "Blocked by WAF: SQL Injection pattern detected\n";
}

# Block SQL Injection patterns in full request URI - encoded and plain
if ($request_uri ~* "(union(%20|\+)*select|select(%20|\+)*.*from|insert(%20|\+)*into|drop(%20|\+)*table|(%27|')(%20|\+)*or(%20|\+)*(%27|')?1(%27|')?=(%27|')?1|or(%20|\+)*1=1)") {
    return 403 "Blocked by WAF: Encoded SQL Injection pattern detected\n";
}

# Block XSS patterns in raw request URI
if ($request_uri ~* "(<script|%3cscript|</script|%3c/script|javascript:|onerror=|onload=|alert\()") {
    return 403 "Blocked by WAF: XSS pattern detected\n";
}

# Block path traversal attempts
if ($uri ~* "\.\.") {
    return 403 "Blocked by WAF: Path Traversal detected\n";
}

# Block encoded path traversal in full URI
if ($request_uri ~* "(\.\.|%2e%2e|%252e%252e)") {
    return 403 "Blocked by WAF: Encoded Path Traversal detected\n";
}

# Block suspicious user agents
if ($http_user_agent ~* "(sqlmap|nikto|nmap|masscan|acunetix|nessus)") {
    return 403 "Blocked by WAF: Suspicious User-Agent detected\n";
}